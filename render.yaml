services:
  # Single Service Deployment (Django + React)
  - type: web
    name: talentlink
    env: python
    region: oregon
    # Use the build.sh script to build frontend and prepare backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    # Start Gunicorn
    startCommand: "cd talentlink && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: REACT_APP_API_URL
        value: "/api"
