services:
  - type: web
    name: talentlink-backend
    env: python
    buildCommand: "cd talentlink && pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "cd talentlink && gunicorn backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: "talentlink-7pqy.onrender.com,localhost,127.0.0.1"