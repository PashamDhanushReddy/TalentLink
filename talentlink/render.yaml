services:
  - type: web
    name: talentlink
    env: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd talentlink && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: "talentlink-7pqy.onrender.com,localhost,127.0.0.1,.onrender.com"
